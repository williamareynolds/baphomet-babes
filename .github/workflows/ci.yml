name: CI

# One pipeline for everything. Tests run on every push and PR. The three deploys
# run only after all tests pass, and only on a push to main (or a manual
# dispatch). Each deploy is its own job so they run in parallel.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: movie-night-api
  IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/movie-night/api

jobs:
  # ---------------------------------------------------------------- tests ----
  test:
    name: Unit, property & golden tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run test suites
        # hub is WASM-only; covered by the type-check step below
        run: cargo test --workspace --exclude hub

      - name: Type-check WASM frontend
        run: cargo check -p hub --target wasm32-unknown-unknown

  integration:
    name: Integration tests (Firestore emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: cloud-firestore-emulator

      - name: Start Firestore emulator
        run: |
          gcloud emulators firestore start --host-port=127.0.0.1:8787 --quiet > /tmp/firestore-emulator.log 2>&1 &
          for i in $(seq 1 45); do
            grep -q "running" /tmp/firestore-emulator.log 2>/dev/null && break
            sleep 2
          done
          grep "running" /tmp/firestore-emulator.log

      # FirestoreDb::new resolves a GCP token source even when targeting the
      # emulator. The emulator ignores the token, but the lookup must succeed —
      # so provide credentials (mirrors local ADC).
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run integration tests
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8787
        run: cargo test -p backend --test integration

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: cloud-firestore-emulator

      - uses: cargo-bins/cargo-binstall@main

      - name: Install trunk
        # --force: rust-cache restores binstall's metadata but not ~/.cargo/bin,
        # so without it binstall sees "already installed" and skips, leaving no
        # actual trunk binary on disk.
        run: cargo binstall -y --force trunk

      - uses: actions/setup-node@v5
        with:
          node-version-file: e2e/.nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit

      # The e2e backend binary uses FirestoreDb::new (default token source),
      # which needs credentials even against the emulator. Emulator ignores the
      # token; the lookup just has to succeed.
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Start each server in its own step with output redirected to a file, so
      # their (orphaning) processes never hold the test step's stdout pipe. In CI
      # Playwright is configured to REUSE these rather than spawn/teardown its
      # own — so the test step exits cleanly with no teardown hang. The final
      # step reaps them.
      - name: Start Firestore emulator
        run: |
          nohup gcloud emulators firestore start --host-port=127.0.0.1:8790 --quiet \
            > /tmp/emulator.log 2>&1 &
          for i in $(seq 1 60); do
            (echo > /dev/tcp/127.0.0.1/8790) 2>/dev/null && break
            sleep 1
          done
          (echo > /dev/tcp/127.0.0.1/8790) 2>/dev/null \
            || { echo "emulator failed to start"; cat /tmp/emulator.log; exit 1; }
          echo "emulator up on :8790"

      - name: Start backend
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8790
          GCP_PROJECT_ID: bb-e2e
          JWT_SECRET: e2e-test-secret
          SUPERADMIN_INVITE_CODE: e2e-boot-code
          RUST_LOG: info
        run: |
          nohup cargo run -p backend > /tmp/backend.log 2>&1 &
          for i in $(seq 1 150); do
            curl -sf http://localhost:8080/health >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:8080/health >/dev/null \
            || { echo "backend failed to start"; cat /tmp/backend.log; exit 1; }
          echo "backend up on :8080"

      # trunk (the hub server) is left for Playwright to start/stop — it's a
      # single process that tears down cleanly. Only the emulator and backend
      # (whose orphaned grandchildren hung teardown) are pre-started above.
      - name: Run e2e tests
        working-directory: e2e
        run: npx playwright test

      - name: Stop background servers
        if: always()
        run: |
          pkill -9 -f cloud_firestore_emulator || true
          pkill -9 -f firestore || true
          pkill -9 java || true
          pkill -9 -f 'target/debug/backend' || true
          pkill -9 -f trunk || true
          true

  # -------------------------------------------------------------- deploys ----
  # Gate: only after every test job passes, and only on a push to main or a
  # manual run. Skipped entirely on pull requests.
  deploy-backend:
    name: Deploy backend (Cloud Run)
    needs: [test, integration, e2e]
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "^@^GCP_PROJECT_ID=$PROJECT_ID@JWT_SECRET=${{ secrets.JWT_SECRET }}@SUPERADMIN_INVITE_CODE=${{ secrets.SUPERADMIN_INVITE_CODE }}@ALLOWED_ORIGINS=https://baphometbabes.com@FCM_ENABLE=true@RUST_LOG=info"

  deploy-hub:
    name: Deploy hub (Firebase Hosting)
    needs: [test, integration, e2e]
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: cargo-bins/cargo-binstall@main

      - name: Install trunk
        run: cargo binstall -y --force trunk

      - name: Build
        working-directory: hub
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          trunk build --release
          # Stamp the published version so deployed clients can detect updates.
          echo "{\"version\":\"${BUILD_SHA}\"}" > dist/version.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          target: hub
          projectId: ${{ vars.GCP_PROJECT_ID }}
