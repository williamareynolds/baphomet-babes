name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit, property & golden tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run test suites
        # frontend/hub are WASM-only; covered by the type-check step below
        run: cargo test --workspace --exclude frontend --exclude hub

      - name: Type-check WASM frontends
        run: |
          cargo check -p hub --target wasm32-unknown-unknown
          cargo check -p frontend --target wasm32-unknown-unknown

  integration:
    name: Integration tests (Firestore emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: cloud-firestore-emulator

      - name: Start Firestore emulator
        run: |
          gcloud emulators firestore start --host-port=127.0.0.1:8787 --quiet > /tmp/firestore-emulator.log 2>&1 &
          for i in $(seq 1 45); do
            grep -q "running" /tmp/firestore-emulator.log 2>/dev/null && break
            sleep 2
          done
          grep "running" /tmp/firestore-emulator.log

      # FirestoreDb::new resolves a GCP token source even when targeting the
      # emulator. The emulator ignores the token, but the lookup must succeed —
      # so provide credentials (mirrors local ADC).
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run integration tests
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8787
        run: cargo test -p backend --test integration

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: cloud-firestore-emulator

      - uses: cargo-bins/cargo-binstall@main

      - name: Install trunk
        run: cargo binstall -y trunk

      - uses: actions/setup-node@v4
        with:
          node-version-file: e2e/.nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # The e2e backend binary uses FirestoreDb::new (default token source),
      # which needs credentials even against the emulator. Emulator ignores the
      # token; the lookup just has to succeed.
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run e2e tests
        working-directory: e2e
        run: |
          set +e
          # Playwright hangs on teardown: its webServers spawn grandchildren (the
          # emulator's Java process, the cargo-run backend) that don't get killed
          # and hold the step's stdout pipe open, so `npx playwright test` never
          # returns. A background watchdog force-kills them well after the tests
          # (which take well under a minute) have finished, letting teardown — and
          # the step — complete. Test results are finalized before teardown, so
          # the exit code still reflects pass/fail.
          kill_servers() {
            # The emulator is a Java process (a grandchild of gcloud); the
            # backend is a grandchild of cargo. Match all of them.
            pkill -9 -f cloud_firestore_emulator
            pkill -9 -f firestore
            pkill -9 java
            pkill -9 -f 'target/debug/backend'
            pkill -9 -f trunk
            true
          }
          ( sleep 240; kill_servers ) &
          watchdog=$!
          npx playwright test
          code=$?
          kill "$watchdog" 2>/dev/null
          kill_servers
          exit $code
