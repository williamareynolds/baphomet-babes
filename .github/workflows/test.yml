name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit, property & golden tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run test suites
        # frontend/hub are WASM-only; covered by the type-check step below
        run: cargo test --workspace --exclude frontend --exclude hub

      - name: Type-check WASM frontends
        run: |
          cargo check -p hub --target wasm32-unknown-unknown
          cargo check -p frontend --target wasm32-unknown-unknown

  integration:
    name: Integration tests (Firestore emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: cloud-firestore-emulator

      - name: Start Firestore emulator
        run: |
          gcloud emulators firestore start --host-port=127.0.0.1:8787 --quiet > /tmp/firestore-emulator.log 2>&1 &
          for i in $(seq 1 45); do
            grep -q "running" /tmp/firestore-emulator.log 2>/dev/null && break
            sleep 2
          done
          grep "running" /tmp/firestore-emulator.log

      # FirestoreDb::new resolves a GCP token source even when targeting the
      # emulator. The emulator ignores the token, but the lookup must succeed —
      # so provide credentials (mirrors local ADC).
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run integration tests
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8787
        run: cargo test -p backend --test integration

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: cloud-firestore-emulator

      - uses: cargo-bins/cargo-binstall@main

      - name: Install trunk
        run: cargo binstall -y trunk

      - uses: actions/setup-node@v4
        with:
          node-version-file: e2e/.nvmrc
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # The e2e backend binary uses FirestoreDb::new (default token source),
      # which needs credentials even against the emulator. Emulator ignores the
      # token; the lookup just has to succeed.
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Start each server in its own step with output redirected to a file, so
      # their (orphaning) processes never hold the test step's stdout pipe. In CI
      # Playwright is configured to REUSE these rather than spawn/teardown its
      # own — so the test step exits cleanly with no teardown hang. The final
      # step reaps them.
      - name: Start Firestore emulator
        run: |
          nohup gcloud emulators firestore start --host-port=127.0.0.1:8790 --quiet \
            > /tmp/emulator.log 2>&1 &
          for i in $(seq 1 60); do
            (echo > /dev/tcp/127.0.0.1/8790) 2>/dev/null && break
            sleep 1
          done
          (echo > /dev/tcp/127.0.0.1/8790) 2>/dev/null \
            || { echo "emulator failed to start"; cat /tmp/emulator.log; exit 1; }
          echo "emulator up on :8790"

      - name: Start backend
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8790
          GCP_PROJECT_ID: bb-e2e
          JWT_SECRET: e2e-test-secret
          SUPERADMIN_INVITE_CODE: e2e-boot-code
          RUST_LOG: info
        run: |
          nohup cargo run -p backend > /tmp/backend.log 2>&1 &
          for i in $(seq 1 150); do
            curl -sf http://localhost:8080/health >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:8080/health >/dev/null \
            || { echo "backend failed to start"; cat /tmp/backend.log; exit 1; }
          echo "backend up on :8080"

      - name: Start hub
        working-directory: hub
        run: |
          nohup trunk serve > /tmp/trunk.log 2>&1 &
          for i in $(seq 1 150); do
            curl -sf http://localhost:3001 >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:3001 >/dev/null \
            || { echo "hub failed to start"; cat /tmp/trunk.log; exit 1; }
          echo "hub up on :3001"

      - name: Run e2e tests
        working-directory: e2e
        run: npx playwright test

      - name: Stop background servers
        if: always()
        run: |
          pkill -9 -f cloud_firestore_emulator || true
          pkill -9 -f firestore || true
          pkill -9 java || true
          pkill -9 -f 'target/debug/backend' || true
          pkill -9 -f trunk || true
          true
