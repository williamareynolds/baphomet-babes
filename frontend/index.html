<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="/manifest.json" />
    <title>Movie Night</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
      nav { background: #16213e; padding: 1rem 2rem; display: flex; gap: 1.5rem; align-items: center; }
      nav a { color: #e94560; text-decoration: none; font-weight: 600; }
      nav a:hover { text-decoration: underline; }
      main { padding: 2rem; max-width: 900px; margin: 0 auto; }
      h1, h2 { color: #e94560; margin-bottom: 1rem; }
      .card { background: #16213e; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
      .badge-main { background: #e94560; color: white; }
      .badge-special { background: #0f3460; color: #e0e0e0; }
      input, select, textarea { width: 100%; padding: 0.5rem; margin: 0.25rem 0 0.75rem; background: #0f3460; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; }
      button { padding: 0.5rem 1.25rem; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
      button:hover { background: #c73652; }
      button.secondary { background: #0f3460; }
      button.secondary:hover { background: #1a4a80; }
      .error { color: #ff6b6b; margin: 0.5rem 0; }
      .success { color: #6bffb8; margin: 0.5rem 0; }
      label { font-size: 0.85rem; color: #aaa; }
      form { max-width: 400px; }
    </style>
  </head>
  <body></body>
</html>
